@if (viewModel.isCreateRoomLoading) {
  <div class="flex justify-center py-2">
    <div
      class="animate-spin rounded-full h-8 w-8 border-2 border-zinc-200 border-t-violet-600"
    ></div>
  </div>
} @else {
  <div class="space-y-2">
    <div class="flex gap-2 sm:gap-3">
      <input
        #input
        type="text"
        placeholder="Nom de votre salle"
        class="min-w-0 flex-1 px-4 py-3 sm:px-6 sm:py-4 bg-zinc-50 border border-zinc-200 rounded-xl focus:border-violet-500 focus:ring-2 focus:ring-violet-500/10 text-zinc-900 placeholder-zinc-400 text-sm sm:text-base outline-none transition-all"
        [class.border-red-400]="viewModel.isCreateRoomError"
      />
      <button
        (click)="roomController.createRoom(input.value)"
        class="shrink-0 px-5 py-3 sm:px-8 sm:py-4 bg-violet-600 text-white text-sm sm:text-base font-medium rounded-xl hover:bg-violet-700 active:scale-95 whitespace-nowrap transition-all"
      >
        Créer
      </button>
    </div>
    @if (viewModel.isCreateRoomError) {
      <p class="text-red-500 text-xs font-light text-left px-1">
        Impossible de créer la salle. Veuillez réessayer.
      </p>
    }
  </div>
}
