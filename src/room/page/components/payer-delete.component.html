<!-- Delete Payer Button -->
<button
  (click)="deleteDialog.showModal()"
  class="w-full px-5 py-3 bg-red-50 text-red-600 text-sm font-medium rounded-xl hover:bg-red-100 active:scale-95 whitespace-nowrap transition-all"
>
  Supprimer
</button>

<!-- Delete Payer Confirmation Dialog -->
<dialog
  #deleteDialog
  class="fixed top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 m-0 bg-white border border-zinc-200 rounded-2xl p-6 max-w-md w-[calc(100%-2rem)] space-y-5 shadow-2xl backdrop:bg-zinc-900/60 text-left"
>
  <!-- Header -->
  <div class="flex items-center gap-3 pb-4 border-b border-red-100">
    <div class="w-9 h-9 rounded-xl bg-red-50 flex items-center justify-center shrink-0">
      <span class="material-symbols-outlined text-red-600 text-xl">person_remove</span>
    </div>
    <div class="text-left">
      <h2 class="text-zinc-900 font-medium">Supprimer le participant</h2>
      <p class="text-red-500 text-xs font-light">Action irréversible</p>
    </div>
  </div>

  <!-- Description -->
  <p class="text-zinc-600 text-sm font-light">
    Vous êtes sur le point de supprimer "<strong class="text-zinc-900">{{ payer().name }}</strong
    >" ainsi que toutes ses dépenses.
  </p>

  <!-- Error Message -->
  @if (payer().isErrorDeletePayer) {
    <div class="p-3 bg-red-50 border border-red-200 rounded-xl">
      <p class="text-red-600 text-sm font-light">
        Impossible de supprimer le participant. Veuillez réessayer.
      </p>
    </div>
  }

  <!-- Actions -->
  @if (payer().isLoadingDeletePayer) {
    <div class="flex justify-center py-2">
      <div
        class="animate-spin rounded-full h-8 w-8 border-2 border-zinc-200 border-t-violet-600"
      ></div>
    </div>
  } @else {
    <div class="flex gap-3">
      <button
        (click)="deleteDialog.close()"
        class="flex-1 px-5 py-3 bg-zinc-100 text-zinc-700 text-sm font-medium rounded-xl hover:bg-zinc-200 active:scale-95 whitespace-nowrap transition-all"
      >
        Annuler
      </button>
      <button
        (click)="roomController.validateDeletePayer(payer().id, deleteDialog)"
        class="flex-1 px-5 py-3 bg-red-600 text-white text-sm font-medium rounded-xl hover:bg-red-700 active:scale-95 whitespace-nowrap transition-all"
      >
        Supprimer
      </button>
    </div>
  }
</dialog>
