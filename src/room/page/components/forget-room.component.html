<!-- Forget Room Button -->
<button
  (click)="dialog.showModal()"
  class="p-1.5 rounded-lg hover:bg-zinc-100 active:scale-95 transition-all flex items-center justify-center"
  aria-label="Retirer de la liste"
>
  <span class="material-symbols-outlined text-zinc-400 text-base">close</span>
</button>

<!-- Forget Room Dialog -->
<dialog
  #dialog
  class="fixed top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 m-0 bg-white border border-zinc-200 rounded-2xl p-6 max-w-md w-[calc(100%-2rem)] space-y-5 shadow-2xl backdrop:bg-zinc-900/60 text-left"
>
  <!-- Header -->
  <div class="flex items-center gap-3 pb-4 border-b border-zinc-100">
    <div class="w-9 h-9 rounded-xl bg-zinc-100 flex items-center justify-center shrink-0">
      <span class="material-symbols-outlined text-zinc-500 text-xl">visibility_off</span>
    </div>
    <div class="text-left">
      <h2 class="text-zinc-900 font-medium">Retirer de la liste</h2>
      <p class="text-zinc-500 text-xs font-light">La salle ne sera pas supprimée</p>
    </div>
  </div>

  <!-- Description -->
  <p class="text-zinc-600 text-sm font-light">
    Retirer "<strong class="text-zinc-900">{{ visitedRoom().name }}</strong
    >" de votre historique local ?
  </p>

  <div class="flex gap-3">
    <button
      (click)="dialog.close()"
      class="flex-1 px-5 py-3 bg-zinc-100 text-zinc-700 text-sm font-medium rounded-xl hover:bg-zinc-200 active:scale-95 whitespace-nowrap transition-all"
    >
      Annuler
    </button>
    <button
      (click)="roomController.forgetRoom(visitedRoom().id, dialog)"
      class="flex-1 px-5 py-3 bg-violet-600 text-white text-sm font-medium rounded-xl hover:bg-violet-700 active:scale-95 whitespace-nowrap transition-all"
    >
      Retirer
    </button>
  </div>
</dialog>
