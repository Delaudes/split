<!-- Delete Button -->
<button
  (click)="dialog.showModal()"
  class="p-1.5 rounded-lg hover:bg-rose-500/10 active:scale-95 transition-all flex items-center justify-center"
  aria-label="Supprimer la dépense"
>
  <span class="material-symbols-outlined text-rose-400/50 text-base">delete</span>
</button>

<!-- Delete Confirmation Dialog -->
<dialog
  #dialog
  class="fixed top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 m-0 bg-blue-950 border border-amber-400/20 rounded-2xl p-6 max-w-md w-[calc(100%-2rem)] space-y-5 backdrop:bg-blue-950/95 text-left"
>
  <!-- Header -->
  <div class="flex items-center gap-3 pb-4 border-b border-rose-500/20">
    <div class="w-9 h-9 rounded-xl bg-rose-500/10 flex items-center justify-center shrink-0">
      <span class="material-symbols-outlined text-rose-400 text-xl">receipt_long</span>
    </div>
    <div class="text-left">
      <h2 class="text-amber-200 font-medium">Supprimer la dépense</h2>
      <p class="text-rose-400/70 text-xs font-light">Action irréversible</p>
    </div>
  </div>

  <!-- Description -->
  <p class="text-amber-200/60 text-sm font-light">
    Supprimer "<strong class="text-amber-200">{{ expense().description }}</strong
    >" d'un montant de <strong class="text-amber-400">{{ expense().amount }}</strong> ?
  </p>

  <!-- Error Message -->
  @if (expense().isErrorDeleteExpense) {
    <div class="p-3 bg-rose-500/10 border border-rose-500/30 rounded-xl">
      <p class="text-rose-300 text-sm font-light">
        Impossible de supprimer la dépense. Veuillez réessayer.
      </p>
    </div>
  }

  <!-- Actions -->
  @if (expense().isLoadingDeleteExpense) {
    <div class="flex justify-center py-2">
      <div
        class="animate-spin rounded-full h-8 w-8 border-2 border-amber-400/20 border-t-amber-400"
      ></div>
    </div>
  } @else {
    <div class="flex gap-3">
      <button
        (click)="dialog.close()"
        class="flex-1 px-5 py-3 bg-amber-400/10 text-amber-200 text-sm font-medium rounded-xl hover:bg-amber-400/20 active:scale-95 whitespace-nowrap transition-all"
      >
        Annuler
      </button>
      <button
        (click)="roomController.validateDeleteExpense(expense().id, dialog)"
        class="flex-1 px-5 py-3 bg-rose-500 text-white text-sm font-medium rounded-xl hover:bg-rose-400 active:scale-95 whitespace-nowrap transition-all"
      >
        Supprimer
      </button>
    </div>
  }
</dialog>
