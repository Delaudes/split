<details class="p-4 rounded-xl bg-amber-400/5 border border-amber-400/10 text-left">
  <summary class="cursor-pointer space-y-2 list-none">
    <!-- Header -->
    <div class="flex items-center justify-between">
      <div class="flex items-center gap-2">
        <span class="material-symbols-outlined text-amber-400 text-xl">history</span>
        <h3 class="text-amber-200 font-medium text-sm">Mes salles</h3>
      </div>
      <span class="material-symbols-outlined text-amber-400 text-xl">expand_more</span>
    </div>

    <!-- Stats -->
    <div class="flex gap-3 text-xs">
      <div class="flex items-center gap-1.5 text-amber-200/60 font-light">
        <span class="material-symbols-outlined text-amber-400/60 text-base">meeting_room</span>
        <span class="text-amber-200 font-medium">{{ visitedRooms.length }}</span>
      </div>
    </div>
  </summary>

  <!-- Contenu pliable -->
  <div class="mt-4 pt-4 border-t border-amber-400/10 space-y-3">
    @for (room of visitedRooms; track room.id) {
      <div class="flex items-center gap-2">
        <div
          (click)="roomController.selectRoom(room.id)"
          class="flex items-center justify-between p-3 rounded-xl bg-amber-400/5 border border-amber-400/10 cursor-pointer hover:bg-amber-400/10 hover:border-amber-400/20 transition-all flex-1"
        >
          <p class="text-amber-200 text-sm font-light">{{ room.name }}</p>
          <span class="material-symbols-outlined text-amber-400/60 text-base">arrow_forward</span>
        </div>
        <app-forget-room [visitedRoom]="room" />
      </div>
    } @empty {
      <div class="p-4 rounded-xl bg-amber-400/5 border border-amber-400/10 text-center">
        <span class="material-symbols-outlined text-amber-400/40 text-3xl">visibility_off</span>
        <p class="text-amber-200/60 text-xs font-light mt-2">Aucune salle visitée</p>
      </div>
    }
  </div>
</details>
