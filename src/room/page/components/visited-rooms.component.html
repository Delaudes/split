@if (visitedRooms.length > 0) {
  <div>
    <p class="text-amber-200/30 text-xs font-light tracking-wider uppercase mb-2">Mes salles</p>
    <div class="divide-y divide-amber-400/10">
      @for (room of visitedRooms; track room.id) {
        <div class="flex items-center gap-2">
          <div
            (click)="roomController.selectRoom(room.id)"
            class="flex items-center justify-between px-1 py-3 cursor-pointer transition-all flex-1 group"
          >
            <p
              class="text-amber-200 text-sm font-light group-hover:text-amber-100 transition-colors"
            >
              {{ room.name }}
            </p>
            <span
              class="material-symbols-outlined text-amber-400/30 text-base group-hover:text-amber-400/60 transition-colors"
              >arrow_forward</span
            >
          </div>
          <app-forget-room [visitedRoom]="room" />
        </div>
      }
    </div>
  </div>
}
