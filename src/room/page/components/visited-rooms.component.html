@if (visitedRooms.length > 0) {
  <div>
    <p class="text-zinc-400 text-xs font-light tracking-wider uppercase mb-3">Mes salles</p>
    <div class="rounded-2xl border border-zinc-200 overflow-hidden divide-y divide-zinc-100">
      @for (room of visitedRooms; track room.id) {
        <div class="flex items-center bg-white hover:bg-zinc-50 transition-colors pr-2">
          <div
            (click)="roomController.selectRoom(room.id)"
            class="flex items-center justify-between px-4 py-3.5 cursor-pointer flex-1 group"
          >
            <p
              class="text-zinc-800 text-sm font-medium group-hover:text-zinc-900 transition-colors"
            >
              {{ room.name }}
            </p>
            <span
              class="material-symbols-outlined text-zinc-400 text-base group-hover:text-violet-600 transition-colors"
              >arrow_forward</span
            >
          </div>
          <app-forget-room [visitedRoom]="room" />
        </div>
      }
    </div>
  </div>
}
