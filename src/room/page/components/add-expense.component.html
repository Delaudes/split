<!-- Add Expense Button -->
<button
  (click)="dialog.showModal()"
  class="flex items-center gap-2 py-1 w-full cursor-pointer hover:opacity-70 transition-opacity"
  aria-label="Ajouter une dépense"
>
  <span class="material-symbols-outlined text-zinc-400 text-base">add</span>
  <p class="text-zinc-400 text-xs font-light">Ajouter une dépense</p>
</button>

<!-- Add Expense Dialog -->
<dialog
  #dialog
  class="fixed top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 m-0 bg-white border border-zinc-200 rounded-2xl p-6 max-w-md w-[calc(100%-2rem)] space-y-5 shadow-2xl backdrop:bg-zinc-900/60 text-left"
>
  <!-- Header -->
  <div class="flex items-center gap-3 pb-4 border-b border-zinc-100">
    <div class="w-9 h-9 rounded-xl bg-violet-50 flex items-center justify-center shrink-0">
      <span class="material-symbols-outlined text-violet-600 text-xl">receipt_long</span>
    </div>
    <div class="text-left">
      <h2 class="text-zinc-900 font-medium">Ajouter une dépense</h2>
      <p class="text-zinc-500 text-xs font-light">{{ payer().name }}</p>
    </div>
  </div>

  <!-- Form -->
  @if (viewModel.isLoadingAddExpense) {
    <div class="flex justify-center py-2">
      <div
        class="animate-spin rounded-full h-8 w-8 border-2 border-zinc-200 border-t-violet-600"
      ></div>
    </div>
  } @else {
    <div class="space-y-2">
      <input
        #descriptionInput
        type="text"
        placeholder="Description"
        class="w-full px-4 py-3 bg-zinc-50 border border-zinc-200 rounded-xl focus:border-violet-500 focus:ring-2 focus:ring-violet-500/10 text-zinc-900 placeholder-zinc-400 text-sm outline-none transition-all"
        [class.border-red-400]="viewModel.isErrorAddExpense"
      />
      <input
        #amountInput
        type="text"
        inputmode="decimal"
        placeholder="Montant"
        class="w-full px-4 py-3 bg-zinc-50 border border-zinc-200 rounded-xl focus:border-violet-500 focus:ring-2 focus:ring-violet-500/10 text-zinc-900 placeholder-zinc-400 text-sm outline-none transition-all"
        [class.border-red-400]="viewModel.isErrorAddExpense"
        (input)="amountInput.value = amountInput.value.replace(/[^0-9.,]/g, '')"
      />
    </div>

    <!-- Error Message -->
    @if (viewModel.isErrorAddExpense) {
      <div class="p-3 bg-red-50 border border-red-200 rounded-xl">
        <p class="text-red-600 text-sm font-light">
          Impossible d'ajouter la dépense. Veuillez réessayer.
        </p>
      </div>
    }

    <!-- Actions -->
    <div class="flex gap-3">
      <button
        (click)="dialog.close()"
        class="flex-1 px-5 py-3 bg-zinc-100 text-zinc-700 text-sm font-medium rounded-xl hover:bg-zinc-200 active:scale-95 whitespace-nowrap transition-all"
      >
        Annuler
      </button>
      <button
        (click)="
          roomController.addExpense(descriptionInput.value, amountInput.value, payer().id, dialog)
        "
        class="flex-1 px-5 py-3 bg-violet-600 text-white text-sm font-medium rounded-xl hover:bg-violet-700 active:scale-95 whitespace-nowrap transition-all"
      >
        Ajouter
      </button>
    </div>
  }
</dialog>
