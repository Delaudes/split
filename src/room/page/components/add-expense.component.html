<!-- Add Expense Button -->
<button
  (click)="dialog.showModal()"
  class="p-1.5 rounded-lg hover:bg-amber-400/10 active:scale-95 transition-all flex items-center justify-center"
  aria-label="Ajouter une dépense"
>
  <span class="material-symbols-outlined text-amber-400/60 text-base">add_circle</span>
</button>

<!-- Add Expense Dialog -->
<dialog
  #dialog
  class="fixed top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 m-0 bg-blue-950 border border-amber-400/20 rounded-2xl p-6 max-w-md w-[calc(100%-2rem)] space-y-5 backdrop:bg-blue-950/95 text-left"
>
  <!-- Header -->
  <div class="flex items-center gap-3 pb-4 border-b border-amber-400/10">
    <div class="w-9 h-9 rounded-xl bg-amber-400/10 flex items-center justify-center shrink-0">
      <span class="material-symbols-outlined text-amber-400 text-xl">receipt_long</span>
    </div>
    <div class="text-left">
      <h2 class="text-amber-200 font-medium">Ajouter une dépense</h2>
      <p class="text-amber-200/40 text-xs font-light">{{ payer().name }}</p>
    </div>
  </div>

  <!-- Form -->
  @if (viewModel.isLoadingAddExpense) {
    <div class="flex justify-center py-2">
      <div
        class="animate-spin rounded-full h-8 w-8 border-2 border-amber-400/20 border-t-amber-400"
      ></div>
    </div>
  } @else {
    <div class="space-y-2">
      <input
        #descriptionInput
        type="text"
        placeholder="Description"
        class="w-full px-4 py-3 bg-amber-50 border-2 border-amber-400/40 rounded-xl focus:border-amber-400 focus:ring-2 focus:ring-amber-400/20 text-blue-950 placeholder-blue-950/40 text-sm outline-none transition-all"
        [class.border-rose-400]="viewModel.isErrorAddExpense"
      />
      <input
        #amountInput
        type="text"
        inputmode="decimal"
        placeholder="Montant"
        class="w-full px-4 py-3 bg-amber-50 border-2 border-amber-400/40 rounded-xl focus:border-amber-400 focus:ring-2 focus:ring-amber-400/20 text-blue-950 placeholder-blue-950/40 text-sm outline-none transition-all"
        [class.border-rose-400]="viewModel.isErrorAddExpense"
        (input)="amountInput.value = amountInput.value.replace(/[^0-9.,]/g, '')"
      />
    </div>

    <!-- Error Message -->
    @if (viewModel.isErrorAddExpense) {
      <div class="p-3 bg-rose-500/10 border border-rose-500/30 rounded-xl">
        <p class="text-rose-300 text-sm font-light">
          Impossible d'ajouter la dépense. Veuillez réessayer.
        </p>
      </div>
    }

    <!-- Actions -->
    <div class="flex gap-3">
      <button
        (click)="dialog.close()"
        class="flex-1 px-5 py-3 bg-amber-400/10 text-amber-200 text-sm font-medium rounded-xl hover:bg-amber-400/20 active:scale-95 whitespace-nowrap transition-all"
      >
        Fermer
      </button>
      <button
        (click)="
          roomController.addExpense(descriptionInput.value, amountInput.value, payer().id, dialog)
        "
        class="flex-1 px-5 py-3 bg-amber-500 text-blue-950 text-sm font-medium rounded-xl hover:bg-amber-400 active:scale-95 whitespace-nowrap transition-all"
      >
        Ajouter
      </button>
    </div>
  }
</dialog>
