<div class="min-h-screen bg-blue-950 flex items-center justify-center px-6 py-12">
  <div class="max-w-xl w-full space-y-8 text-center">
    <!-- Title -->
    <div class="space-y-3">
      <h1 class="text-5xl md:text-6xl font-light text-amber-400">$plit</h1>
      <div
        class="flex items-center justify-center gap-2 text-amber-200/30 text-xs font-light tracking-wider uppercase"
      >
        @for (feature of features; track feature.icon; let last = $last) {
          <span>{{ feature.title }}</span>
          @if (!last) {
            <span class="opacity-40">·</span>
          }
        }
      </div>
    </div>

    <!-- Visited Rooms -->
    <div class="text-left">
      <app-visited-rooms />
    </div>

    <!-- Divider -->
    <div class="flex items-center gap-4">
      <div class="flex-1 h-px bg-amber-400/10"></div>
      <span class="text-amber-200/20 text-xs font-light uppercase tracking-wider"
        >Nouvelle salle</span
      >
      <div class="flex-1 h-px bg-amber-400/10"></div>
    </div>

    <!-- Create Room Form -->
    <app-create-room-form />
  </div>
</div>
